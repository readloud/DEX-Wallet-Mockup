<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E1E2E">
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22DEX%20Mockup%22,%22short_name%22:%22DEX%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231E1E2E%22,%22theme_color%22:%22%233B82F6%22}">
  <title>DEX Wallet Mockup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, Helvetica, sans-serif;
    }

    body {
      background: #0F0F1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* App container - seperti layar HP */
    .app-container {
      width: 100%;
      max-width: 420px;
      height: 700px;
      background: #13131F;
      border-radius: 36px;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      position: relative;
      scrollbar-width: thin;
    }

    .app-container::-webkit-scrollbar {
      width: 4px;
    }

    /* Status bar placeholder */
    .status-bar {
      padding: 12px 20px 8px;
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      background: #13131F;
    }

    /* Bottom navigation */
    .bottom-nav {
      position: sticky;
      bottom: 0;
      background: rgba(19, 19, 31, 0.96);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 12px 20px 24px;
      border-top: 1px solid #2A2A3A;
      margin-top: 16px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #6B6B8A;
      font-size: 12px;
      transition: 0.2s;
      cursor: pointer;
      background: none;
      border: none;
    }

    .nav-item.active {
      color: #3B82F6;
    }

    .nav-icon {
      font-size: 24px;
    }

    /* Page content */
    .page {
      padding: 16px 20px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .page.active-page {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Card style */
    .card {
      background: #1E1E2E;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #2C2C3E;
    }

    .balance-large {
      font-size: 36px;
      font-weight: 700;
      color: white;
    }

    .token-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #2C2C3E;
    }

    .token-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .token-icon {
      width: 40px;
      height: 40px;
      background: #2F2F44;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    .swap-input {
      background: #0A0A12;
      border: 1px solid #2C2C3E;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .swap-header {
      display: flex;
      justify-content: space-between;
      color: #8B8BA0;
      margin-bottom: 8px;
    }

    .swap-amount {
      background: none;
      border: none;
      font-size: 28px;
      font-weight: 600;
      color: white;
      width: 100%;
      outline: none;
    }

    button {
      background: #3B82F6;
      border: none;
      padding: 16px;
      border-radius: 44px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.97);
      background: #2563eb;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #2C2C3E;
      color: #DDD;
    }

    .address-box {
      background: #0A0A12;
      padding: 12px;
      border-radius: 20px;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      letter-spacing: 0.5px;
      color: #3B82F6;
    }

    h2 {
      color: white;
      margin-bottom: 16px;
      font-size: 24px;
    }

    h3 {
      color: white;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .small-label {
      color: #8B8BA0;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 🔋 100%</span>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboardPage" class="page active-page">
    <div class="card" style="text-align: center;">
      <div class="small-label">Total Balance</div>
      <div class="balance-large">$12,845.32</div>
      <div style="display: flex; justify-content: center; gap: 20px; margin-top: 12px;">
        <div><span style="color:#3B82F6;">▼</span> Send</div>
        <div><span style="color:#10B981;">▲</span> Receive</div>
        <div>💱 Swap</div>
      </div>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between;">
        <h3>Assets</h3>
        <span style="color:#6B6B8A;">▼</span>
      </div>
      <div id="tokenListDashboard">
        <!-- Token list via JS -->
      </div>
    </div>
  </div>

  <!-- SWAP PAGE -->
  <div id="swapPage" class="page">
    <h2>Swap</h2>
    <div class="swap-input">
      <div class="swap-header">
        <span>From</span>
        <span>Balance: 1,245 USDC</span>
      </div>
      <input type="number" id="swapFromAmount" class="swap-amount" placeholder="0.0" value="100">
      <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
        <span style="background:#2C2C3E; padding:4px 12px; border-radius:40px;">USDC</span>
      </div>
    </div>

    <div style="text-align: center; margin: 8px 0;">↓</div>

    <div class="swap-input">
      <div class="swap-header">
        <span>To</span>
        <span>Balance: 0.89 ETH</span>
      </div>
      <input type="number" id="swapToAmount" class="swap-amount" placeholder="0.0" value="0.045" readonly>
      <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
        <span style="background:#2C2C3E; padding:4px 12px; border-radius:40px;">ETH</span>
      </div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <div class="small-label">Rate</div>
      <div>1 USDC ≈ 0.00045 ETH</div>
      <div class="small-label" style="margin-top: 10px;">Slippage Tolerance: 0.5%</div>
    </div>
    <button id="swapBtn">Preview Swap</button>
    <div id="swapMsg" style="margin-top: 12px; text-align: center; color:#F97316; font-size:13px;"></div>
  </div>

  <!-- TOKEN LIST PAGE -->
  <div id="tokensPage" class="page">
    <h2>All Tokens</h2>
    <div id="fullTokenList"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div id="profilePage" class="page">
    <h2>Profile</h2>
    <div class="card">
      <div class="address-box">
        0x71C...3F2a
      </div>
      <div class="profile-item">
        <span>Wallet Name</span>
        <span>DEX Main</span>
      </div>
      <div class="profile-item">
        <span>Network</span>
        <span>Ethereum Mainnet</span>
      </div>
      <div class="profile-item">
        <span>Wallet Connect</span>
        <span>✅ Active</span>
      </div>
    </div>
    <button id="disconnectBtn" style="background:#2C2C3E; color:#EF4444;">Disconnect</button>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <button class="nav-item" data-page="dashboard">
      <div class="nav-icon">🏠</div>
      <span>Home</span>
    </button>
    <button class="nav-item" data-page="swap">
      <div class="nav-icon">🔄</div>
      <span>Swap</span>
    </button>
    <button class="nav-item" data-page="tokens">
      <div class="nav-icon">📋</div>
      <span>Tokens</span>
    </button>
    <button class="nav-item" data-page="profile">
      <div class="nav-icon">👤</div>
      <span>Profile</span>
    </button>
  </div>
</div>

<script>
  // MOCK DATA
  const userTokens = [
    { symbol: "ETH", name: "Ethereum", balance: 2.45, usdValue: 5831.0, icon: "⟠" },
    { symbol: "USDC", name: "USD Coin", balance: 5240.32, usdValue: 5240.32, icon: "💵" },
    { symbol: "BNB", name: "Binance Coin", balance: 12.3, usdValue: 5892.0, icon: "🟡" },
    { symbol: "CAKE", name: "PancakeSwap", balance: 187.5, usdValue: 423.75, icon: "🍰" }
  ];

  function renderTokenList(containerId, showUsd = true) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    userTokens.forEach(token => {
      const row = document.createElement("div");
      row.className = "token-row";
      row.innerHTML = `
        <div class="token-left">
          <div class="token-icon">${token.icon}</div>
          <div>
            <div style="color:white; font-weight:500;">${token.symbol}</div>
            <div class="small-label">${token.name}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="color:white;">${token.balance} ${token.symbol}</div>
          ${showUsd ? `<div class="small-label">$${token.usdValue.toLocaleString()}</div>` : ""}
        </div>
      `;
      container.appendChild(row);
    });
  }

  // dashboard token list & full tokens list
  renderTokenList("tokenListDashboard", true);
  renderTokenList("fullTokenList", true);

  // Page navigation
  const pages = ["dashboard", "swap", "tokens", "profile"];
  function showPage(pageId) {
    pages.forEach(p => {
      const pageElem = document.getElementById(`${p}Page`);
      if (pageElem) pageElem.classList.remove("active-page");
      const navBtn = document.querySelector(`.nav-item[data-page="${p}"]`);
      if (navBtn) navBtn.classList.remove("active");
    });
    const activePage = document.getElementById(`${pageId}Page`);
    if (activePage) activePage.classList.add("active-page");
    const activeNav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
    if (activeNav) activeNav.classList.add("active");
  }

  document.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const page = btn.getAttribute("data-page");
      if (page) showPage(page);
    });
  });

  // Swap simulation logic
  const swapFromInput = document.getElementById("swapFromAmount");
  const swapToInput = document.getElementById("swapToAmount");
  const swapBtn = document.getElementById("swapBtn");
  const swapMsg = document.getElementById("swapMsg");

  function updateSwapTo() {
    let fromVal = parseFloat(swapFromInput.value);
    if (isNaN(fromVal)) fromVal = 0;
    // Rate mock: 1 USDC = 0.00045 ETH
    const rate = 0.00045;
    let toVal = fromVal * rate;
    swapToInput.value = toVal.toFixed(6);
  }

  swapFromInput.addEventListener("input", updateSwapTo);
  updateSwapTo();

  swapBtn.addEventListener("click", () => {
    const fromAmt = parseFloat(swapFromInput.value);
    if (fromAmt <= 0) {
      swapMsg.innerText = "❌ Enter valid amount";
      return;
    }
    if (fromAmt > 5240.32) { // mock max USDC balance
      swapMsg.innerText = "❌ Insufficient USDC balance";
      return;
    }
    swapMsg.innerText = `✅ Swap ${fromAmt} USDC → ${swapToInput.value} ETH (Mock)`;
    setTimeout(() => {
      swapMsg.innerText = "";
    }, 2500);
  });

  // Disconnect mock
  document.getElementById("disconnectBtn")?.addEventListener("click", () => {
    alert("Disconnected (Mock) - Would logout from DEX wallet");
  });

  // Receive & send mock actions via dashboard
  document.querySelector(".card:first-child")?.addEventListener("click", (e) => {
    if(e.target.innerText.includes("Send")) alert("Send Mock: Navigate to send page");
    if(e.target.innerText.includes("Receive")) alert("Receive: Share your address 0x71C...3F2a");
    if(e.target.innerText.includes("Swap")) showPage("swap");
  });

  // Optional: styling bottom nav active default
  document.querySelector('.nav-item[data-page="dashboard"]').classList.add("active");
</script>
</body>
</html>
